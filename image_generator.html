<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>画像生成</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 20px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: #ccc;
    }

    #preview {
      width: 100%;
      max-width: 400px;
      aspect-ratio: 3/4;
      border-radius: 16px;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
    }

    #preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #placeholder {
      font-size: 48px;
      opacity: 0.3;
    }

    #spinner {
      display: none;
      width: 48px;
      height: 48px;
      border: 3px solid #333;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #btn {
      width: 100%;
      max-width: 400px;
      padding: 18px;
      border: none;
      border-radius: 14px;
      background: #fff;
      color: #000;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #btn:active { opacity: 0.7; }
    #btn:disabled { background: #444; color: #888; cursor: default; }

    #hint {
      font-size: 13px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    #hint.visible { color: #888; }

    #error {
      font-size: 14px;
      color: #ff6b6b;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <h1>日本人女性 画像生成</h1>

  <div id="preview">
    <span id="placeholder">📷</span>
    <div id="spinner"></div>
    <img id="result" alt="生成画像">
  </div>

  <button id="btn" onclick="generate()">タップして生成</button>

  <p id="hint">生成後、画像を長押しして「写真に保存」</p>
  <p id="error"></p>

<script>
  const PROMPTS = [
    "japanese high school girl student, full body, school uniform, standing, natural light, photorealistic, 4k",
    "japanese female student, full body, blazer uniform, outdoor school campus, sunny day, photorealistic",
    "japanese girl student, full body shot, sailor uniform, smiling, street background, realistic photo",
    "japanese female student, full body, school bag, standing pose, soft lighting, high quality photo",
    "japanese high school girl, full body, uniform, cherry blossom background, natural pose, photorealistic",
  ];

  async function generate() {
    const btn = document.getElementById("btn");
    const spinner = document.getElementById("spinner");
    const placeholder = document.getElementById("placeholder");
    const img = document.getElementById("result");
    const hint = document.getElementById("hint");
    const error = document.getElementById("error");

    btn.disabled = true;
    btn.textContent = "生成中...";
    spinner.style.display = "block";
    placeholder.style.display = "none";
    img.style.display = "none";
    error.style.display = "none";
    hint.className = "";
    hint.textContent = "生成中です、少々お待ちください...";

    const seed = Math.floor(Math.random() * 99999);
    const prompt = PROMPTS[Math.floor(Math.random() * PROMPTS.length)];
    const encoded = encodeURIComponent(prompt);
    const url = `https://image.pollinations.ai/prompt/${encoded}?width=768&height=1024&seed=${seed}&nologo=true&enhance=true`;

    try {
      const response = await fetch(url);
      if (!response.ok) throw new Error("取得失敗");

      const blob = await response.blob();
      const objectUrl = URL.createObjectURL(blob);

      img.onload = () => {
        spinner.style.display = "none";
        img.style.display = "block";
        hint.className = "visible";
        hint.textContent = "長押しして「写真に保存」を選んでください";
        btn.disabled = false;
        btn.textContent = "もう一枚生成";
      };
      img.src = objectUrl;

    } catch (e) {
      spinner.style.display = "none";
      placeholder.style.display = "block";
      error.style.display = "block";
      error.textContent = "エラーが発生しました。通信環境を確認してください。";
      hint.textContent = "";
      btn.disabled = false;
      btn.textContent = "タップして生成";
    }
  }
</script>

</body>
</html>
